name: Deploy Flutter Web

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: Debug - List all files
        run: |
          echo "Listing all files in repository:"
          ls -la
          echo ""
          echo "Checking if web folder exists:"
          ls -la web/ || echo "web folder does NOT exist!"
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Try to build and show full error
        run: |
          flutter build web --release || {
            echo "========================================="
            echo "BUILD FAILED! Showing flutter doctor:"
            echo "========================================="
            flutter doctor -v
            exit 1
          }
      
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4